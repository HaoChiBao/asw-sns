<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — ASW SMS</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-cream-paper: #ffffeb;
      --color-midnight-ink: #1a1a1a;
      --color-white: #ffffff;
      --color-stone-mist: #e4e4d0;
      --color-graphite-veil: #8a8a80;
      --color-smoke: #5f5f59;
      --color-deep-forest-teal: #034f46;
      --color-lavender-whisper: #f0d7ff;
      --font-figtree: 'Figtree', ui-sans-serif, system-ui, sans-serif;
      --font-eb-garamond: 'EB Garamond', Georgia, serif;
      --text-caption: 14px;
      --leading-caption: 1.3;
      --text-body: 16px;
      --leading-body: 1.3;
      --radius-cards: 32px;
      --radius-buttons: 14px;
      --card-padding: 32px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-cream-paper);
      color: var(--color-midnight-ink);
      font-family: var(--font-figtree);
      font-weight: 400;
      font-size: var(--text-body);
      line-height: var(--leading-body);
      padding: 24px;
    }

    .card {
      width: min(440px, 100%);
      background: var(--color-white);
      border: 1px solid var(--color-stone-mist);
      border-radius: var(--radius-cards);
      padding: var(--card-padding);
    }

    h1 {
      font-family: var(--font-eb-garamond);
      font-weight: 400;
      font-size: 48px;
      line-height: 0.95;
      letter-spacing: -0.07em;
      margin-bottom: 12px;
      font-feature-settings: "liga" on, "dlig" on;
    }

    h1 .muted { color: var(--color-graphite-veil); }
    h1 .accent { color: var(--color-midnight-ink); }

    .subtitle {
      color: var(--color-midnight-ink);
      font-size: 18px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: var(--text-caption);
      font-weight: 500;
      color: var(--color-midnight-ink);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border: 1px solid var(--color-graphite-veil);
      border-radius: var(--radius-buttons);
      padding: 12px 14px;
      font-family: var(--font-figtree);
      font-size: var(--text-body);
      background: var(--color-cream-paper);
      color: var(--color-midnight-ink);
      margin-bottom: 20px;
    }

    input:focus {
      outline: 2px solid var(--color-lavender-whisper);
      outline-offset: 1px;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--color-lavender-whisper);
      color: var(--color-midnight-ink);
      border: 1px solid var(--color-midnight-ink);
      border-radius: var(--radius-buttons);
      padding: 12px 18px;
      font-family: var(--font-figtree);
      font-size: var(--text-caption);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button[type="submit"]:hover { opacity: 0.85; }

    .error {
      color: var(--color-deep-forest-teal);
      font-size: var(--text-caption);
      font-weight: 500;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .hint {
      margin-top: 24px;
      font-size: var(--text-caption);
      color: var(--color-smoke);
      line-height: var(--leading-caption);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="muted">ASW</span> <span class="accent">SMS</span></h1>
    <p class="subtitle">Sign in to access your SMS dashboard.</p>
    <form id="login-form">
      <label for="password">Dashboard password</label>
      <input id="password" type="password" autocomplete="current-password" required autofocus />
      <div class="error" id="error"></div>
      <button type="submit">Sign in</button>
    </form>
    <p class="hint">This dashboard reads from a stored message API only — no AWS login on this server.</p>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Sign in failed');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message || 'Sign in failed';
      }
    });
  </script>
</body>
</html>
