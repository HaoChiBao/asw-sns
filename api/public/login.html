<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — ASW SMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;550&family=Playfair+Display:wght@300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-linen: #fafffa;
      --color-obsidian-ink: #121613;
      --color-sage: #516254;
      --color-mist: #c8d2c8;
      --color-voltage: #2bee4b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-linen);
      color: var(--color-obsidian-ink);
      font-family: Inter, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      padding: 32px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-size: 48px;
      line-height: 0.95;
      margin-bottom: 8px;
    }
    p { color: var(--color-sage); font-size: 14px; margin-bottom: 24px; }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-sage);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      border: 1px solid var(--color-mist);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      background: var(--color-linen);
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      background: var(--color-voltage);
      color: var(--color-obsidian-ink);
      border: none;
      border-radius: 10px;
      padding: 16px;
      font: inherit;
      font-weight: 550;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: rgba(16, 94, 29, 0.45) 1px 8px 20px 0px;
    }
    .error {
      color: #8b1a1a;
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 20px;
    }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--color-sage);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ASW SMS</h1>
    <p>Sign in to access your SMS dashboard.</p>
    <form id="login-form">
      <label for="password">Dashboard password</label>
      <input id="password" type="password" autocomplete="current-password" required autofocus />
      <div class="error" id="error"></div>
      <button type="submit">Sign in →</button>
    </form>
    <p class="hint">This dashboard reads from a stored message API only — no AWS login on this server.</p>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Sign in failed');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message || 'Sign in failed';
      }
    });
  </script>
</body>
</html>
