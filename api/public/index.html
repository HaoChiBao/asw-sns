<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASW SMS — Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;400;550&family=Playfair+Display:wght@300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-linen: #fafffa;
      --color-obsidian-ink: #121613;
      --color-sage: #516254;
      --color-mist: #c8d2c8;
      --color-voltage: #2bee4b;
      --font-ui: Inter, sans-serif;
      --font-display: 'Playfair Display', serif;
      --radius-card: 14px;
      --page-max: 1200px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-linen);
      color: var(--color-obsidian-ink);
      font-family: var(--font-ui);
      font-weight: 350;
      font-size: 16px;
      line-height: 1.4;
      min-height: 100vh;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      max-width: var(--page-max);
      margin: 0 auto;
    }
    .wordmark { font-size: 14px; font-weight: 550; }
    .wordmark .accent { color: var(--color-voltage); }
    .nav-actions { display: flex; gap: 16px; align-items: center; }
    .nav-status { font-size: 11px; text-transform: uppercase; color: var(--color-sage); letter-spacing: 0.1em; }
    .hero {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 50px 40px;
    }
    .tick { width: 50px; height: 2px; background: var(--color-voltage); margin-bottom: 16px; }
    .hero h1 {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(40px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }
    .hero p { margin-top: 12px; color: var(--color-sage); font-size: 14px; max-width: 50ch; }
    .layout {
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 50px 80px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
    }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } .nav, .hero, .layout { padding-left: 20px; padding-right: 20px; } }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-sage);
      margin-bottom: 12px;
    }
    h2 { font-size: 18px; font-weight: 400; margin-bottom: 16px; }
    .phone-list { list-style: none; display: grid; gap: 10px; }
    .phone-item {
      padding: 14px;
      border-radius: var(--radius-card);
      font-size: 16px;
    }
    .phone-meta { font-size: 11px; text-transform: uppercase; color: var(--color-sage); margin-top: 4px; letter-spacing: 0.08em; }
    .messages-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .messages-table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-sage);
      padding: 0 12px 12px 0;
      font-weight: 350;
    }
    .messages-table td {
      padding: 14px 12px 14px 0;
      border-top: 1px solid var(--color-mist);
      vertical-align: top;
    }
    .message-body { max-width: 360px; word-break: break-word; }
    .empty { color: var(--color-sage); font-size: 14px; }
    .btn-ghost {
      background: none;
      border: none;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .banner {
      max-width: var(--page-max);
      margin: 0 auto 24px;
      padding: 0 50px;
    }
    .banner[hidden] { display: none; }
    .banner__inner {
      background: #3d1515;
      color: var(--color-linen);
      border-radius: var(--radius-card);
      padding: 14px 18px;
      font-size: 14px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--color-obsidian-ink);
      color: var(--color-linen);
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="wordmark"><span>ASW</span><span class="accent">SMS</span></div>
    <div class="nav-actions">
      <div class="nav-status" id="status">Loading…</div>
      <button class="btn-ghost" type="button" id="refresh-btn">Refresh</button>
      <button class="btn-ghost" type="button" id="logout-btn" hidden>Sign out</button>
    </div>
  </header>

  <div class="banner" id="banner" hidden>
    <div class="banner__inner" id="banner-text"></div>
  </div>

  <section class="hero">
    <div class="tick"></div>
    <h1>Inbound messages</h1>
    <p>Read-only view of SMS received on your pool numbers. Data comes from the message store — no AWS login required on this server.</p>
  </section>

  <main class="layout">
    <aside>
      <div class="section-label">Numbers</div>
      <h2>Phone pool</h2>
      <ul class="phone-list" id="phone-list">
        <li class="empty">Loading…</li>
      </ul>
    </aside>

    <section>
      <div class="section-label">Inbox</div>
      <h2>Messages</h2>
      <div id="messages-wrap"><p class="empty">Loading…</p></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    const statusEl = document.getElementById('status');
    const phoneListEl = document.getElementById('phone-list');
    const messagesWrap = document.getElementById('messages-wrap');
    const toast = document.getElementById('toast');

    async function apiFetch(url) {
      const res = await fetch(url);
      if (res.status === 401) {
        window.location.href = '/login.html';
        throw new Error('Sign in required');
      }
      return res;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.className = 'toast show';
      setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function renderPhones(numbers) {
      if (!numbers.length) {
        phoneListEl.innerHTML = '<li class="empty">No numbers configured.</li>';
        return;
      }
      phoneListEl.innerHTML = numbers.map((p) => `
        <li class="phone-item">
          <div>${escapeHtml(p.phoneNumber)}</div>
          <div class="phone-meta">${escapeHtml(p.label)}</div>
        </li>
      `).join('');
    }

    function renderMessages(messages) {
      if (!messages.length) {
        messagesWrap.innerHTML = '<p class="empty">No messages yet. Text one of your pool numbers to create an entry.</p>';
        return;
      }
      messagesWrap.innerHTML = `
        <table class="messages-table">
          <thead>
            <tr>
              <th>Received</th>
              <th>From</th>
              <th>To</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody>
            ${messages.map((m) => `
              <tr>
                <td>${fmtDate(m.receivedAt)}</td>
                <td>${escapeHtml(m.fromNumber)}</td>
                <td>${escapeHtml(m.toNumber)}</td>
                <td class="message-body">${escapeHtml(m.messageBody)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showBanner(text) {
      const banner = document.getElementById('banner');
      const inner = document.getElementById('banner-text');
      banner.hidden = false;
      inner.textContent = text;
    }

    async function refresh() {
      try {
        const health = await fetch('/api/health').then((r) => r.json());
        document.getElementById('logout-btn').hidden = !health.authRequired;

        if (!health.readerApiConfigured) {
          statusEl.textContent = 'Not configured';
          showBanner('Set READER_API_URL in .env to your deployed read API URL, then restart the dashboard.');
          return;
        }

        const [messagesRes, phonesRes] = await Promise.all([
          apiFetch('/api/messages'),
          apiFetch('/api/phone-numbers'),
        ]);

        if (!messagesRes.ok || !phonesRes.ok) {
          throw new Error('Could not load data from the read API');
        }

        const { messages } = await messagesRes.json();
        const { phoneNumbers } = await phonesRes.json();

        statusEl.textContent = `${messages.length} message${messages.length === 1 ? '' : 's'}`;
        renderPhones(phoneNumbers);
        renderMessages(messages);
      } catch (err) {
        statusEl.textContent = 'Error';
        showBanner(err.message || 'Failed to load');
        showToast(err.message || 'Failed to load');
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', refresh);
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
