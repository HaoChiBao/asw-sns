<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASW SMS — Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-cream-paper: #ffffeb;
      --color-midnight-ink: #1a1a1a;
      --color-white: #ffffff;
      --color-stone-mist: #e4e4d0;
      --color-graphite-veil: #8a8a80;
      --color-smoke: #5f5f59;
      --color-charcoal: #222222;
      --color-deep-forest-teal: #034f46;
      --color-lavender-whisper: #f0d7ff;
      --color-amber-pulse: #ffa946;
      --font-figtree: 'Figtree', ui-sans-serif, system-ui, sans-serif;
      --font-eb-garamond: 'EB Garamond', Georgia, serif;
      --text-caption: 14px;
      --leading-caption: 1.3;
      --text-body: 16px;
      --leading-body: 1.3;
      --text-subheading: 20px;
      --text-heading-sm: 24px;
      --radius-nav: 14px;
      --radius-cards: 32px;
      --radius-buttons: 14px;
      --radius-smallbadges: 8px;
      --page-max-width: 1200px;
      --card-padding: 32px;
      --nav-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-cream-paper);
      color: var(--color-midnight-ink);
      font-family: var(--font-figtree);
      font-weight: 400;
      font-size: var(--text-body);
      line-height: var(--leading-body);
      min-height: 100vh;
    }

    .nav-wrap {
      padding: var(--spacing-24, 24px) 50px 0;
      max-width: var(--page-max-width);
      margin: 0 auto;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--color-white);
      border: 1px solid var(--color-stone-mist);
      border-radius: var(--radius-nav);
      padding: 10px 16px;
      box-shadow: var(--nav-shadow);
    }

    .wordmark {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .wordmark .muted { color: var(--color-graphite-veil); }
    .wordmark .accent { color: var(--color-midnight-ink); }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-status {
      font-size: var(--text-caption);
      font-weight: 500;
      color: var(--color-smoke);
    }

    .btn {
      font-family: var(--font-figtree);
      font-size: var(--text-caption);
      font-weight: 600;
      line-height: 1;
      border-radius: var(--radius-buttons);
      padding: 10px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--color-midnight-ink);
      color: var(--color-midnight-ink);
    }

    .btn-primary {
      background: var(--color-lavender-whisper);
      border: 1px solid var(--color-midnight-ink);
      color: var(--color-midnight-ink);
    }

    .banner {
      background: var(--color-deep-forest-teal);
      color: var(--color-white);
      padding: 14px 24px;
      text-align: center;
      font-size: var(--text-caption);
      font-weight: 500;
      margin-top: 24px;
    }

    .banner[hidden] { display: none; }

    .hero {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 64px 50px 48px;
      text-align: center;
    }

    .hero h1 {
      font-family: var(--font-eb-garamond);
      font-weight: 400;
      font-size: clamp(48px, 8vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-feature-settings: "liga" on, "dlig" on;
    }

    .hero h1 .muted { color: var(--color-graphite-veil); }
    .hero h1 .accent { color: var(--color-midnight-ink); }

    .hero p {
      margin-top: 20px;
      color: var(--color-midnight-ink);
      font-size: 18px;
      max-width: 52ch;
      margin-left: auto;
      margin-right: auto;
    }

    .layout {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 0 50px 80px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 32px;
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      .nav-wrap, .hero, .layout { padding-left: 20px; padding-right: 20px; }
    }

    .card {
      background: var(--color-white);
      border: 1px solid var(--color-stone-mist);
      border-radius: var(--radius-cards);
      padding: var(--card-padding);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-white);
      background: var(--color-deep-forest-teal);
      border-radius: 1000px;
      padding: 6px 14px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: var(--text-subheading);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 20px;
    }

    .phone-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .phone-item {
      padding: 16px;
      border-radius: var(--radius-nav);
      border: 1px solid var(--color-stone-mist);
      background: var(--color-cream-paper);
      font-size: var(--text-body);
      font-weight: 500;
    }

    .phone-meta {
      font-size: var(--text-caption);
      font-weight: 500;
      color: var(--color-smoke);
      margin-top: 6px;
    }

    .messages-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-caption);
    }

    .messages-table th {
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-smoke);
      padding: 0 12px 14px 0;
    }

    .messages-table td {
      padding: 16px 12px 16px 0;
      border-top: 1px solid var(--color-stone-mist);
      vertical-align: top;
    }

    .message-body { max-width: 360px; word-break: break-word; }

    .empty {
      color: var(--color-smoke);
      font-size: var(--text-caption);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--color-midnight-ink);
      color: var(--color-white);
      padding: 14px 20px;
      border-radius: var(--radius-buttons);
      font-size: var(--text-caption);
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <header class="nav">
      <div class="wordmark"><span class="muted">ASW</span><span class="accent">SMS</span></div>
      <div class="nav-actions">
        <div class="nav-status" id="status">Loading…</div>
        <button class="btn btn-ghost" type="button" id="refresh-btn">Refresh</button>
        <button class="btn btn-ghost" type="button" id="logout-btn" hidden>Sign out</button>
      </div>
    </header>
  </div>

  <div class="banner" id="banner" hidden>
    <span id="banner-text"></span>
  </div>

  <section class="hero">
    <h1><span class="muted">Inbound</span> <span class="accent">messages</span></h1>
    <p>Read-only view of SMS received on your pool numbers. Data comes from the message store — no AWS login required on this server.</p>
  </section>

  <main class="layout">
    <aside class="card">
      <div class="badge">Numbers</div>
      <h2>Phone pool</h2>
      <ul class="phone-list" id="phone-list">
        <li class="empty">Loading…</li>
      </ul>
    </aside>

    <section class="card">
      <div class="badge">Inbox</div>
      <h2>Messages</h2>
      <div id="messages-wrap"><p class="empty">Loading…</p></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    const statusEl = document.getElementById('status');
    const phoneListEl = document.getElementById('phone-list');
    const messagesWrap = document.getElementById('messages-wrap');
    const toast = document.getElementById('toast');

    async function apiFetch(url) {
      const res = await fetch(url);
      if (res.status === 401) {
        window.location.href = '/login.html';
        throw new Error('Sign in required');
      }
      return res;
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.className = 'toast show';
      setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function renderPhones(numbers) {
      if (!numbers.length) {
        phoneListEl.innerHTML = '<li class="empty">No numbers configured.</li>';
        return;
      }
      phoneListEl.innerHTML = numbers.map((p) => `
        <li class="phone-item">
          <div>${escapeHtml(p.phoneNumber)}</div>
          <div class="phone-meta">${escapeHtml(p.label)}</div>
        </li>
      `).join('');
    }

    function renderMessages(messages) {
      if (!messages.length) {
        messagesWrap.innerHTML = '<p class="empty">No messages yet. Text one of your pool numbers to create an entry.</p>';
        return;
      }
      messagesWrap.innerHTML = `
        <table class="messages-table">
          <thead>
            <tr>
              <th>Received</th>
              <th>From</th>
              <th>To</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody>
            ${messages.map((m) => `
              <tr>
                <td>${fmtDate(m.receivedAt)}</td>
                <td>${escapeHtml(m.fromNumber)}</td>
                <td>${escapeHtml(m.toNumber)}</td>
                <td class="message-body">${escapeHtml(m.messageBody)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showBanner(text) {
      const banner = document.getElementById('banner');
      const inner = document.getElementById('banner-text');
      banner.hidden = false;
      inner.textContent = text;
    }

    async function refresh() {
      try {
        const health = await fetch('/api/health').then((r) => r.json());
        document.getElementById('logout-btn').hidden = !health.authRequired;

        if (!health.readerApiConfigured) {
          statusEl.textContent = 'Not configured';
          showBanner('Set READER_API_URL in .env to your deployed read API URL, then restart the dashboard.');
          return;
        }

        const [messagesRes, phonesRes] = await Promise.all([
          apiFetch('/api/messages'),
          apiFetch('/api/phone-numbers'),
        ]);

        if (!messagesRes.ok || !phonesRes.ok) {
          throw new Error('Could not load data from the read API');
        }

        const { messages } = await messagesRes.json();
        const { phoneNumbers } = await phonesRes.json();

        statusEl.textContent = `${messages.length} message${messages.length === 1 ? '' : 's'}`;
        renderPhones(phoneNumbers);
        renderMessages(messages);
      } catch (err) {
        statusEl.textContent = 'Error';
        showBanner(err.message || 'Failed to load');
        showToast(err.message || 'Failed to load');
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', refresh);
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
